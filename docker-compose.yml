# PostgreSQL kept for optional future use (embeddings/pgvector).
# Cartograph uses SQLite by default — this is NOT required.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: cartograph
      POSTGRES_USER: cartograph
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartograph"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
